name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Services not needed by the test suite.  Excluding them avoids pulling
  # their Docker images and cuts ~30-40s off `supabase start`.
  SUPABASE_EXCLUDE: studio,imgproxy,logflare,vector,postgres-meta,mailpit,supavisor,realtime

jobs:
  # ------------------------------------------------------------------
  # Phase 1 — static checks and unit tests (no Supabase needed)
  # Runs on every PR and push to main.
  # ------------------------------------------------------------------
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Svelte check
        run: npm -w web run check

      - name: Unit tests (API/shared)
        run: npm run test:unit

      - name: Unit tests (web)
        run: npm -w web run test:unit

  # ------------------------------------------------------------------
  # Phase 2a — integration & API e2e (needs local Supabase)
  # Only runs on push to main (skipped on PRs).
  # ------------------------------------------------------------------
  integration-e2e:
    name: Integration & API E2E
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push'
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Generate config.toml from template
        run: cp supabase/config.toml.template supabase/config.toml

      - name: Start Supabase
        run: supabase start -x "$SUPABASE_EXCLUDE"

      - name: Supabase diagnostics (on failure)
        if: failure()
        run: |
          supabase status || true
          docker ps -a || true

      - run: npm ci

      - name: Export Supabase env vars
        run: |
          eval "$(supabase status -o env)"
          echo "API_URL=$API_URL" >> "$GITHUB_ENV"
          echo "SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "ANON_KEY=$ANON_KEY" >> "$GITHUB_ENV"
          echo "SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> "$GITHUB_ENV"

      - name: Seed storage and AI profile
        run: npm run seed:storage & npm run seed:ai -- --only mock & wait

      - name: Integration tests
        run: npm run test:integration

      - name: API E2E tests
        run: npm run test:e2e

  # ------------------------------------------------------------------
  # Phase 2b — browser e2e (parallel with Phase 2a)
  # Only runs on push to main (skipped on PRs).
  # ------------------------------------------------------------------
  browser-e2e:
    name: Browser E2E
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push'
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Generate config.toml from template
        run: cp supabase/config.toml.template supabase/config.toml

      - name: Start Supabase
        run: supabase start -x "$SUPABASE_EXCLUDE"

      - name: Supabase diagnostics (on failure)
        if: failure()
        run: |
          supabase status || true
          docker ps -a || true

      - run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json', 'web/package.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium webkit

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium webkit

      - name: Export Supabase env vars
        run: |
          eval "$(supabase status -o env)"
          echo "API_URL=$API_URL" >> "$GITHUB_ENV"
          echo "SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "ANON_KEY=$ANON_KEY" >> "$GITHUB_ENV"
          echo "SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> "$GITHUB_ENV"

      - name: Seed storage and AI profile
        run: npm run seed:storage & npm run seed:ai -- --only mock & wait

      - name: Browser E2E tests
        run: npm -w web run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: web/test-results/
          retention-days: 14

  # ------------------------------------------------------------------
  # Phase 3 — deploy (only after all tests pass on push to main)
  # ------------------------------------------------------------------
  deploy:
    name: Deploy to Supabase (dev)
    runs-on: ubuntu-latest
    needs: [integration-e2e, browser-e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev
    timeout-minutes: 15
    concurrency:
      group: deploy-main
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Write deploy env file
        env:
          DEPLOY_ENV_DEV: ${{ secrets.DEPLOY_ENV_DEV }}
          BOOTSTRAP_USERS_DEV: ${{ secrets.BOOTSTRAP_USERS_DEV }}
        run: |
          if [ -z "$DEPLOY_ENV_DEV" ]; then
            echo "Missing DEPLOY_ENV_DEV secret" >&2
            exit 1
          fi
          printf '%s\n' "$DEPLOY_ENV_DEV" > .env.deploy.dev.local
          chmod 600 .env.deploy.dev.local
          if [ -n "$BOOTSTRAP_USERS_DEV" ]; then
            mkdir -p deploy
            printf '%s\n' "$BOOTSTRAP_USERS_DEV" > deploy/bootstrap-users.dev.local.json
            chmod 600 deploy/bootstrap-users.dev.local.json
          fi

      - name: Deploy
        run: npm run deploy:dev
