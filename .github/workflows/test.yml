name: Test Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Services not needed by the test suite.  Excluding them avoids pulling
  # their Docker images and cuts ~30-40s off `supabase start`.
  SUPABASE_EXCLUDE: studio,imgproxy,logflare,vector,postgres-meta,mailpit,supavisor,realtime

jobs:
  # ------------------------------------------------------------------
  # Phase 1 — static checks and unit tests (no Supabase needed)
  # ------------------------------------------------------------------
  static-and-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Svelte check
        run: npm -w web run check

      - name: Unit tests (API/shared)
        run: npm run test:unit

      - name: Unit tests (web)
        run: npm -w web run test:unit

  # ------------------------------------------------------------------
  # Phase 2a — integration & API e2e (needs local Supabase)
  # ------------------------------------------------------------------
  integration-and-api-e2e:
    runs-on: ubuntu-latest
    needs: static-and-unit
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Start Supabase in the background so npm ci runs in parallel.
      - name: Start Supabase (background)
        run: supabase start -x "$SUPABASE_EXCLUDE" &

      - run: npm ci

      - name: Wait for Supabase
        run: |
          timeout 180 bash -c '
            until curl -sf http://127.0.0.1:54331/rest/v1/ > /dev/null 2>&1; do
              sleep 2
            done
          '

      - name: Export Supabase env vars
        run: |
          eval "$(supabase status -o env)"
          echo "API_URL=$API_URL" >> "$GITHUB_ENV"
          echo "SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "ANON_KEY=$ANON_KEY" >> "$GITHUB_ENV"
          echo "SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> "$GITHUB_ENV"

      - name: Seed storage and AI profile
        run: npm run seed:storage & npm run seed:ai -- --only mock & wait

      - name: Integration tests
        run: npm run test:integration

      - name: API E2E tests
        run: npm run test:e2e

  # ------------------------------------------------------------------
  # Phase 2b — browser e2e (parallel with Phase 2a)
  # ------------------------------------------------------------------
  browser-e2e:
    runs-on: ubuntu-latest
    needs: static-and-unit
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Start Supabase in the background so npm ci + Playwright install
      # run in parallel.
      - name: Start Supabase (background)
        run: supabase start -x "$SUPABASE_EXCLUDE" &

      - run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-webkit-${{ runner.os }}-${{ hashFiles('web/package-lock.json', 'web/package.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium webkit

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium webkit

      - name: Wait for Supabase
        run: |
          timeout 180 bash -c '
            until curl -sf http://127.0.0.1:54331/rest/v1/ > /dev/null 2>&1; do
              sleep 2
            done
          '

      - name: Export Supabase env vars
        run: |
          eval "$(supabase status -o env)"
          echo "API_URL=$API_URL" >> "$GITHUB_ENV"
          echo "SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "ANON_KEY=$ANON_KEY" >> "$GITHUB_ENV"
          echo "SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> "$GITHUB_ENV"

      - name: Seed storage and AI profile
        run: npm run seed:storage & npm run seed:ai -- --only mock & wait

      - name: Browser E2E tests
        run: npm -w web run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: web/test-results/
          retention-days: 14
