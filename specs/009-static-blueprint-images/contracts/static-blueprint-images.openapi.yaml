openapi: 3.1.0
info:
  title: Static Blueprint Images Contract
  version: 0.1.0
  description: |
    Contract for static blueprint image support across gameplay APIs and operator workflows.
    All player-facing image access is authenticated and delivered through short-lived signed URLs.
servers:
  - url: http://127.0.0.1:54331/functions/v1
security:
  - bearerAuth: []
paths:
  /blueprints-list:
    get:
      summary: List available blueprints with optional blueprint image IDs
      operationId: listBlueprints
      responses:
        '200':
          description: Blueprint list returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlueprintListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /game-move:
    post:
      summary: Move to a location and return narration with optional location image reference
      operationId: gameMoveWithImage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameMoveRequest'
      responses:
        '200':
          description: Move resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameMoveResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /game-talk:
    post:
      summary: Start talking to a character and return narration with optional portrait reference
      operationId: gameTalkWithPortrait
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameTalkRequest'
      responses:
        '200':
          description: Talk mode entered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameTalkResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /blueprint-image-link:
    post:
      summary: Issue short-lived signed URL for a blueprint image ID
      operationId: issueBlueprintImageLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageLinkRequest'
      responses:
        '200':
          description: Signed URL issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageLinkResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /ops/image-generation/run:
    post:
      summary: Run local operator image generation and blueprint patch workflow
      description: |
        Logical operator contract for local tooling. Execution surface is local CLI/script,
        documented here to keep request/response shape explicit.
      operationId: runImageGeneration
      x-execution-surface: local-operator-cli
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageGenerationRunRequest'
      responses:
        '200':
          description: Generation completed with per-target statuses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageGenerationRunResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /ops/blueprint-package/deploy:
    post:
      summary: Deploy blueprint JSON and referenced images together
      description: |
        Logical operator contract for local deployment tooling. Execution surface is local CLI/script.
      operationId: deployBlueprintPackage
      x-execution-surface: local-operator-cli
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlueprintDeployRequest'
      responses:
        '200':
          description: Deployment completed with image manifest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlueprintDeployResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Invalid payload or invalid operation state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Referenced resource or image not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Unexpected failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      additionalProperties: true
      required: [error]
      properties:
        error:
          type: string
        details:
          type: object
          additionalProperties: true

    Mode:
      type: string
      enum: [explore, talk, accuse, ended]

    VisibleCharacter:
      type: object
      additionalProperties: false
      required: [first_name, last_name]
      properties:
        first_name:
          type: string
        last_name:
          type: string

    BlueprintSummary:
      type: object
      additionalProperties: false
      required: [id, title, one_liner, target_age]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        one_liner:
          type: string
        target_age:
          type: integer
          minimum: 1
        blueprint_image_id:
          type: [string, 'null']

    BlueprintListResponse:
      type: object
      additionalProperties: false
      required: [blueprints]
      properties:
        blueprints:
          type: array
          items:
            $ref: '#/components/schemas/BlueprintSummary'

    GameSessionRequest:
      type: object
      additionalProperties: false
      required: [game_id]
      properties:
        game_id:
          type: string
          format: uuid

    GameMoveRequest:
      allOf:
        - $ref: '#/components/schemas/GameSessionRequest'
        - type: object
          additionalProperties: false
          required: [destination]
          properties:
            destination:
              type: string
              minLength: 1

    GameTalkRequest:
      allOf:
        - $ref: '#/components/schemas/GameSessionRequest'
        - type: object
          additionalProperties: false
          required: [character_name]
          properties:
            character_name:
              type: string
              minLength: 1

    GameMoveResponse:
      type: object
      additionalProperties: false
      required: [narration, mode, current_location, visible_characters, time_remaining]
      properties:
        narration:
          type: string
        mode:
          $ref: '#/components/schemas/Mode'
        current_location:
          type: string
        visible_characters:
          type: array
          items:
            $ref: '#/components/schemas/VisibleCharacter'
        time_remaining:
          type: integer
        location_image_id:
          type: [string, 'null']

    GameTalkResponse:
      type: object
      additionalProperties: false
      required: [narration, mode, current_talk_character, time_remaining]
      properties:
        narration:
          type: string
        mode:
          type: string
          enum: [talk, accuse]
        current_talk_character:
          type: [string, 'null']
        time_remaining:
          type: integer
        character_portrait_image_id:
          type: [string, 'null']

    ImagePurpose:
      type: string
      enum: [blueprint_cover, location_scene, character_portrait]

    ImageLinkRequest:
      type: object
      additionalProperties: false
      required: [blueprint_id, image_id, purpose]
      properties:
        blueprint_id:
          type: string
          format: uuid
        image_id:
          type: string
          minLength: 1
        purpose:
          $ref: '#/components/schemas/ImagePurpose'

    ImageLinkResponse:
      type: object
      additionalProperties: false
      required: [image_id, signed_url, expires_at]
      properties:
        image_id:
          type: string
        signed_url:
          type: string
          format: uri
        expires_at:
          type: string
          format: date-time

    ImageGenerationTarget:
      type: object
      additionalProperties: false
      required: [target_type]
      properties:
        target_type:
          type: string
          enum: [blueprint, character, location]
        target_key:
          type: [string, 'null']

    ImageGenerationRunRequest:
      type: object
      additionalProperties: false
      required: [blueprint_path, output_dir, model, targets]
      properties:
        blueprint_path:
          type: string
        output_dir:
          type: string
        model:
          type: string
        targets:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ImageGenerationTarget'
        overwrite:
          type: boolean
          default: false

    ImageGenerationResult:
      type: object
      additionalProperties: false
      required: [target_type, target_key, status]
      properties:
        target_type:
          type: string
          enum: [blueprint, character, location]
        target_key:
          type: [string, 'null']
        status:
          type: string
          enum: [generated, skipped, failed]
        image_id:
          type: [string, 'null']
        file_path:
          type: [string, 'null']
        error_message:
          type: [string, 'null']

    ImageGenerationRunResponse:
      type: object
      additionalProperties: false
      required: [blueprint_id, results]
      properties:
        blueprint_id:
          type: string
          format: uuid
        results:
          type: array
          items:
            $ref: '#/components/schemas/ImageGenerationResult'

    BlueprintDeployRequest:
      type: object
      additionalProperties: false
      required: [blueprint_path, image_dir, environment]
      properties:
        blueprint_path:
          type: string
        image_dir:
          type: string
        environment:
          type: string
          enum: [dev, staging, prod]
        allow_missing_images:
          type: boolean
          default: true

    BlueprintDeployResponse:
      type: object
      additionalProperties: false
      required: [blueprint_id, blueprint_deployed, image_manifest]
      properties:
        blueprint_id:
          type: string
          format: uuid
        blueprint_deployed:
          type: boolean
        image_manifest:
          type: object
          additionalProperties: false
          required: [attempted, uploaded, missing, failed, warnings]
          properties:
            attempted:
              type: integer
              minimum: 0
            uploaded:
              type: integer
              minimum: 0
            missing:
              type: integer
              minimum: 0
            failed:
              type: integer
              minimum: 0
            warnings:
              type: array
              items:
                type: string
